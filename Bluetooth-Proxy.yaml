substitutions:
  device_name: bluetooth-proxy
  device_friendly_name: bluetooth-proxy
  device_description: Bluetooth Proxy for Battery Compartment.

esphome:
  name: ${device_name}
  friendly_name: ${device_friendly_name}
  comment: ${device_description}
  name_add_mac_suffix: false

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
  min_auth_mode: WPA2

api:
  encryption:
    key: !secret api_key

logger:
  baud_rate: 0
  level: WARN

ota:
  - platform: esphome
    password: !secret ota_password
  - platform: web_server

web_server:
  port: 80
  version: 3
  include_internal: true
  auth:
    username: !secret web_username
    password: !secret web_password

time:
  - platform: homeassistant
    id: homeassistant_time

bluetooth_proxy:
  active: true
  cache_services: true
  connection_slots: 5

esp32_ble:
  max_connections: 5

esp32_ble_beacon:
  type: iBeacon
  uuid: 'c29ce823-e67a-4e71-bff2-abaa32e77a99'

esp32_ble_tracker:
  scan_parameters:
    active: true

button:
  - platform: restart
    id: button_restart
    name: Restart

binary_sensor:
  - platform: status
    name: 'Status'
