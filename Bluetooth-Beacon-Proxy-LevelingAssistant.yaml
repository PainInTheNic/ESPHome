substitutions:
  friendly_name: Bluetooth Beacon Proxy Leveling Assistant
  device_name: bluetooth-beacon-proxy-levelingassistant
  device_description: Bluetooth Beacon & Proxy Leveling Assistant for Home Assistant.

esphome:
  name: ${device_name}
  comment: ${device_description}

esp32:
  board: m5stack-atom
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: '${device_name}.local'
  fast_connect: on
  min_auth_mode: WPA2

logger:
  baud_rate: 0

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password
  - platform: web_server

web_server:
  port: 80
  version: 3
  include_internal: true
  auth:
    username: !secret web_username
    password: !secret web_password

bluetooth_proxy:
  active: true
  cache_services: true
  connection_slots: 5

esp32_ble:
  max_connections: 5

esp32_ble_beacon:
  type: iBeacon
  uuid: ''

esp32_ble_tracker:
  scan_parameters:
    active: true

button:
  - platform: restart
    id: button_restart
    name: Restart

i2c:
  sda: GPIO25
  scl: GPIO21
  scan: true
  id: bus_a

binary_sensor:
  - platform: status
    name: 'Status'

sensor:
  - platform: mpu6886
    i2c_id: bus_a
    address: 0x68
    update_interval: 50ms
#    accel_x:
#      name: "Accel X"
#    accel_y:
#      name: "Accel Y"
#    accel_z:
#      name: "Accel Z"
    gyro_x:
      name: "Gyro X"
      filters:
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
        - delta: 0.2
    gyro_y:
      name: "Gyro Y"
      filters:
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
        - delta: 0.2
    gyro_z:
      name: "Gyro Z"
      filters:
        - sliding_window_moving_average:
            window_size: 5
            send_every: 1
        - delta: 0.2
