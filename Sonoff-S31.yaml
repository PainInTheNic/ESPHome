substitutions:
  friendly_name: Friendly Name Example
  device_name: device-name-example
  device_description: Controlled Outlet and Energy Monitoring for ${friendly_name}.
  restore_mode: RESTORE_DEFAULT_OFF

esphome:
  name: ${device_name}
  comment: ${device_description}

esp8266:
  board: esp01_1m
  restore_from_flash: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: on
  power_save_mode: none
  min_auth_mode: WPA2

logger:
  baud_rate: 0

api:
  encryption:
    key: !secret api_key
  services:
    - service: delayed_power_cycle
      variables:
        delay_time: int
      then:
        - script.execute:
            id: power_cycle_script
            delay_seconds: !lambda 'return delay_time;'
    - service: validate_input
      variables:
        value: int
      then:
        - if:
            condition:
              lambda: 'return value < 0;'
            then:
              - api.respond:
                  success: false
                  error_message: "Value must be positive"
            else:
              - api.respond:
                  success: true

ota:
  - platform: esphome
    password: !secret ota_password
  - platform: web_server

web_server:
  port: 80
  version: 3
  include_internal: true
  auth:
    username: !secret web_username
    password: !secret web_password

time:
  - platform: homeassistant
    id: homeassistant_time

uart:
  rx_pin: GPIO3
  baud_rate: 4800
  parity: EVEN

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    name: 'Button'
    on_press:
      - switch.toggle: relay
  - platform: status
    name: 'Status'

sensor:
  - platform: wifi_signal
    name: 'WiFi Signal'
    update_interval: 60s
  - platform: uptime
    name: 'Uptime'
    filters:
      - lambda: return x / 86400.0;
    unit_of_measurement: d
  - platform: cse7766
    current:
      name: 'Current'
      id: current_amps
      accuracy_decimals: 1
      filters:
        - throttle_average: 5s
        - round: 1
      on_value:
        then:
          - if:
              condition:
                lambda: |-
                  return x > id(overcurrent_limit).state &&
                         !id(overcurrent_latched);
              then:
                - script.execute: overcurrent_trip
    voltage:
      name: 'Voltage'
      accuracy_decimals: 1
      filters:
        - throttle_average: 5s
        - round: 1
    power:
      name: 'Power'
      id: s31_power_w
      accuracy_decimals: 1
      filters:
        - throttle_average: 5s
        - round: 1
    energy:
      name: 'Energy'
      accuracy_decimals: 3
      filters:
        - throttle_average: 5s
        - multiply: 0.001
      unit_of_measurement: kWh

text_sensor:
  - platform: version
    name: 'ESPHome Version'
  - platform: template
    name: 'Overcurrent Protection'
    lambda: |-
      if (id(overcurrent_latched)) return {"On"};
      return {"Off"};
  - platform: wifi_info
    ip_address:
      name: 'IP Address'
    ssid:
      name: 'WiFi SSID'

switch:
  - platform: gpio
    name: 'Relay'
    pin: GPIO12
    id: relay
    restore_mode: ${restore_mode}
    on_turn_on:
      - if:
          condition:
            lambda: 'return id(overcurrent_latched);'
          then:
            - switch.turn_off: relay

status_led:
  pin:
    number: GPIO13
    inverted: yes

button:
  - platform: template
    name: 'Clear Overcurrent Fault'
    on_press:
      - lambda: 'id(overcurrent_latched) = false;'
  - platform: restart
    id: button_restart
    name: Restart

globals:
  - id: overcurrent_latched
    type: bool
    restore_value: true
    initial_value: "false"

number:
  - platform: template
    name: "Overcurrent Limit"
    id: overcurrent_limit
    min_value: 1
    max_value: 15
    step: 1
    initial_value: 15
    restore_value: true
    optimistic: true
    unit_of_measurement: A

script:
  - id: overcurrent_trip
    mode: single
    then:
      - if:
          condition:
            lambda: 'return !id(overcurrent_latched);'
          then:
            - lambda: 'id(overcurrent_latched) = true;'
            - switch.turn_off: relay
  - id: power_cycle_script
    parameters:
      delay_seconds: int
    then:
      - switch.turn_off: relay
      - delay: !lambda 'return delay_seconds * 1000;'
      - switch.turn_on: relay
